  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f4ee; --color-surface:#fdfcf9; --color-surface-2:#ffffff;
      --color-surface-offset:#ede9e0; --color-border:oklch(0.3 0.01 80/0.12);
      --color-divider:oklch(0.3 0.01 80/0.08);
      --color-text:#1e1a14; --color-text-muted:#6b6557; --color-text-faint:#b0a99d;
      --color-primary:#8b4513; --color-primary-hover:#703710; --color-primary-light:#f5ece4;
      --color-google:#4285f4; --color-google-hover:#2b6ddb;
      --shadow-sm:0 1px 3px oklch(0.2 0.02 60/0.08);
      --shadow-md:0 4px 16px oklch(0.2 0.02 60/0.10);
      --radius-sm:0.375rem; --radius-md:0.625rem; --radius-lg:1rem;
      --radius-xl:1.5rem; --radius-full:9999px;
      --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
      --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem;
      --space-12:3rem; --space-16:4rem; --space-20:5rem;
      --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
      --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
      --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --text-hero:clamp(2.8rem,1rem + 5vw,5.5rem);
      --font-display:'Cormorant Garamond',Georgia,serif;
      --font-body:'Work Sans','Helvetica Neue',sans-serif;
      --transition:180ms cubic-bezier(0.16,1,0.3,1);
      --content-narrow:640px; --content-default:900px;
    }
    [data-theme="dark"] {
      --color-bg:#17140f; --color-surface:#1d1a14; --color-surface-2:#23201a;
      --color-surface-offset:#2a2720; --color-border:oklch(0.9 0.01 80/0.10);

    }

    }}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
    body{font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);min-height:100dvh;line-height:1.65;}
    input,textarea,select,button{font:inherit;color:inherit;}
    h1,h2,h3,h4{font-family:var(--font-display);text-wrap:balance;line-height:1.15;}
    p,li{text-wrap:pretty;}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
    .container{max-width:var(--content-default);margin-inline:auto;padding-inline:var(--space-5);}

    .header-inner{display:flex;align-items:center;justify-content:space-between;}

    .logo-text{font-family:var(--font-display);font-size:var(--text-lg);font-weight:600;color:var(--color-primary);line-height:1.1;}
    .logo-sub{font-family:var(--font-body);font-size:var(--text-xs);color:var(--color-text-muted);letter-spacing:.08em;text-transform:uppercase;}
    .theme-toggle{background:none;border:1px solid var(--color-border);border-radius:var(--radius-full);padding:var(--space-2) var(--space-3);cursor:pointer;color:var(--color-text-muted);display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);transition:background var(--transition);}
    .theme-toggle:hover{background:var(--color-surface-offset);}

    .hero-title{font-size:var(--text-hero);font-weight:400;color:var(--color-text);margin-bottom:var(--space-5);font-style:italic;}
    .hero-title strong{font-style:normal;font-weight:600;}
    .hero-desc{font-size:var(--text-lg);color:var(--color-text-muted);max-width:52ch;margin-inline:auto;margin-bottom:var(--space-6);}
    .hero-farm{display:inline-flex;align-items:center;gap:var(--space-2);background:var(--color-primary-light);border:1px solid oklch(from var(--color-primary) l c h/0.2);color:var(--color-primary);padding:var(--space-2) var(--space-5);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:500;}
    .section-form{padding:clamp(var(--space-8),5vw,var(--space-16)) 0;}
    .form-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:clamp(var(--space-8),5vw,var(--space-12));box-shadow:var(--shadow-md);}
    .form-header{margin-bottom:var(--space-8);}
    .form-header h2{font-size:var(--text-xl);font-weight:600;color:var(--color-text);margin-bottom:var(--space-2);}
    .form-header p{color:var(--color-text-muted);}
    .form-row{display:grid;gap:var(--space-5);}
    @media(min-width:600px){.form-row--2{grid-template-columns:1fr 1fr;}}
    .form-group{display:flex;flex-direction:column;gap:var(--space-2);}
    .form-group label{font-size:var(--text-sm);font-weight:600;color:var(--color-text);}
    .hint{font-size:var(--text-xs);color:var(--color-text-faint);}
    input[type="text"],textarea{width:100%;padding:var(--space-3) var(--space-4);background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--text-base);color:var(--color-text);transition:border-color var(--transition),box-shadow var(--transition);}
    input[type="text"]::placeholder,textarea::placeholder{color:var(--color-text-faint);}
    input[type="text"]:focus,textarea:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/0.15);}
    textarea{min-height:140px;resize:vertical;line-height:1.65;}
    .form-divider{height:1px;background:var(--color-divider);margin:var(--space-8) 0;}
    .star-row{display:flex;gap:var(--space-2);margin-top:var(--space-1);}
