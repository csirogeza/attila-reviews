<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you! - Attila Biro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{--color-bg:#f7f4ee;--color-surface:#fdfcf9;--color-border:oklch(0.3 0.01 80/0.12);--color-text:#1e1a14;--color-text-muted:#6b6557;--color-text-faint:#b0a99d;--color-primary:#8b4513;--color-google:#4285f4;--color-google-hover:#2b6ddb;--shadow-md:0 4px 16px oklch(0.2 0.02 60/0.10);--radius-xl:1.5rem;--radius-md:0.625rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-12:3rem;--text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);--text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);--text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);--text-hero:clamp(2.8rem,1rem + 5vw,5.5rem);--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'Work Sans','Helvetica Neue',sans-serif;--transition:180ms cubic-bezier(0.16,1,0.3,1);}
    [data-theme="dark"]{--color-bg:#17140f;--color-surface:#1d1a14;--color-border:oklch(0.9 0.01 80/0.10);--color-text:#e8e2d8;--color-text-muted:#9c9488;--color-primary:#c8724a;--color-google:#6fa8f5;--color-google-hover:#4d8fe0;--shadow-md:0 4px 16px oklch(0 0 0/0.35);}
    @media(prefers-color-scheme:dark){:root:not([data-theme]){--color-bg:#17140f;--color-surface:#1d1a14;--color-border:oklch(0.9 0.01 80/0.10);--color-text:#e8e2d8;--color-text-muted:#9c9488;--color-primary:#c8724a;--color-google:#6fa8f5;--color-google-hover:#4d8fe0;--shadow-md:0 4px 16px oklch(0 0 0/0.35);}}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{font-family:var(--font-body);font-size:var(--text-base);background:var(--color-bg);color:var(--color-text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:var(--space-8) var(--space-5);}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:clamp(var(--space-8),6vw,var(--space-12));box-shadow:var(--shadow-md);max-width:560px;width:100%;text-align:center;animation:fadeUp .5s cubic-bezier(0.16,1,0.3,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .big-emoji{font-size:4rem;margin-bottom:var(--space-5);display:block;animation:popIn .6s cubic-bezier(0.16,1,0.3,1) .2s both;}
    @keyframes popIn{from{transform:scale(0.4);opacity:0;}to{transform:scale(1);opacity:1;}}
    h1{font-family:var(--font-display);font-size:var(--text-hero);font-weight:400;font-style:italic;color:var(--color-text);margin-bottom:var(--space-4);}
    .sub{color:var(--color-text-muted);font-size:var(--text-lg);max-width:38ch;margin:0 auto var(--space-8);}
    .divider{height:1px;background:var(--color-border);margin:var(--space-6) 0;}
    .cta-label{font-size:var(--text-sm);color:var(--color-text-faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:var(--space-4);font-weight:600;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);padding:var(--space-4) var(--space-8);border-radius:var(--radius-md);font-size:var(--text-base);font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all var(--transition);min-height:52px;width:100%;font-family:var(--font-body);margin-bottom:var(--space-3);}
